name: Release

on:
  workflow_dispatch:
    inputs:
      plugin_validation_attestation:
        description: "Required JSON attestation when Claude CLI validation cannot run in the workflow"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    env:
      LEXA_REQUIRE_PLUGIN_VALIDATION: "1"
      LEXA_PLUGIN_VALIDATION_ATTESTATION: ${{ inputs.plugin_validation_attestation }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify version is release-ready
        run: |
          node -e "const p=require('./package.json'); if (p.version === '0.0.0') { throw new Error('Bump package.json version before publishing'); }"
      - run: npm run release:check
      - name: Verify npm token is present
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "$NODE_AUTH_TOKEN"
      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
