name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run audit
      - run: npm run release:pack
      - run: npm run release:artifact-smoke
      - run: npm run release:plugin
